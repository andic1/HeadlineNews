<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Headline News README banner</title>
  <desc id="desc">A visual banner showing a native Android news app connected to an AI service.</desc>
  <defs>
